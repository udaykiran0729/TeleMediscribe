version: '3.8'

services:
  telemediscribe:
    build:
      context: .
      dockerfile: Dockerfile.secure
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount the database for persistence
      - ./instance:/app/instance:rw
      # Mount logs directory
      - ./logs:/app/logs:rw
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    read_only: false
    tmpfs:
      - /tmp
      - /var/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx:rw
    depends_on:
      - telemediscribe
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Security monitoring service
  security-monitor:
    build:
      context: .
      dockerfile: Dockerfile.secure
    command: ["python", "-c", "import time; time.sleep(3600)"]  # Sleep for 1 hour
    volumes:
      - ./security-monitor.bat:/app/security-monitor.bat:ro
      - ./security-reports:/app/security-reports:rw
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      - telemediscribe

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 